<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyber Incident Response Case Manager</title>
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>
  <div class="app" id="appShell">
    <header>
      <div class="brand">
        <h1>IR Case Manager</h1>
      </div>
      <div class="viewer">
        <label for="viewerSelect">View As</label>
        <select id="viewerSelect"></select>
      </div>
    </header>

    <nav id="nav" aria-label="Main navigation"></nav>

    <main>
      <section class="section active" id="dashboard"></section>
      <section class="section" id="incidents"></section>
      <section class="section" id="artifacts"></section>
      <section class="section" id="indicators"></section>
      <section class="section" id="assets"></section>
      <section class="section" id="entities"></section>
      <section class="section" id="timeline"></section>
      <section class="section" id="actions"></section>
      <section class="section" id="attack"></section>
      <section class="section" id="reports"></section>
      <section class="section" id="connectors"></section>
      <section class="section" id="users"></section>
      <section class="section" id="audit"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="disclaimerModal" role="dialog" aria-modal="true" aria-labelledby="disclaimerTitle" aria-hidden="true">
    <div class="modal">
      <div class="modal-header">
        <h2 id="disclaimerTitle">Prototype Disclaimer</h2>
        <button class="modal-close" type="button" id="closeDisclaimer" aria-label="Close disclaimer">Close</button>
      </div>
      <p>This is an educational prototype using fictional sample data. It is not production-ready and should not be used for real sensitive incident data without proper security controls.</p>
    </div>
  </div>

  <div class="modal-backdrop" id="incidentModal" role="dialog" aria-modal="true" aria-labelledby="incidentModalTitle" aria-hidden="true">
    <div class="modal wide">
      <div class="modal-header">
        <h2 id="incidentModalTitle">Create Incident</h2>
        <button class="modal-close" type="button" id="closeIncidentModal" aria-label="Close incident form">Close</button>
      </div>
      <form id="incidentForm" novalidate>
        <input type="hidden" id="incidentMode" value="create">
        <div class="form-grid">
          <div class="form-field">
            <label for="incidentId">Incident ID *</label>
            <input id="incidentId" name="id" autocomplete="off" readonly>
          </div>
          <div class="form-field">
            <label for="incidentTitle">Title *</label>
            <input id="incidentTitle" name="title" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="incidentSeverity">Severity *</label>
            <select id="incidentSeverity" name="severity">
              <option value="">Select severity</option>
              <option>Low</option>
              <option>Medium</option>
              <option>High</option>
              <option>Critical</option>
            </select>
          </div>
          <div class="form-field">
            <label for="incidentStatus">Status *</label>
            <select id="incidentStatus" name="status">
              <option value="">Select status</option>
              <option>New</option>
              <option>Triage</option>
              <option>Investigating</option>
              <option>Containment</option>
              <option>Eradication</option>
              <option>Recovery</option>
              <option>Closed</option>
              <option>False Positive</option>
            </select>
          </div>
          <div class="form-field">
            <label for="incidentType">Incident type *</label>
            <select id="incidentType" name="type">
              <option value="">Select type</option>
              <option>Phishing</option>
              <option>Malware</option>
              <option>Account Compromise</option>
              <option>Business Email Compromise</option>
              <option>Data Exposure</option>
              <option>Vulnerability</option>
              <option>Cloud Alert</option>
              <option>Network Alert</option>
              <option>Insider Risk</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-field">
            <label for="incidentOwner">Owner *</label>
            <input id="incidentOwner" name="owner" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="incidentOpened">Opened date/time *</label>
            <input id="incidentOpened" name="opened" type="datetime-local" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="incidentClosed">Closed date/time</label>
            <input id="incidentClosed" name="closed" type="datetime-local" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="incidentAssignedUsers">Assigned users</label>
            <input id="incidentAssignedUsers" name="assignedUsers" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="incidentAssignedTeam">Assigned team</label>
            <input id="incidentAssignedTeam" name="assignedTeam" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="incidentDetectionSource">Detection source</label>
            <input id="incidentDetectionSource" name="detectionSource" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="incidentVisibility">Visibility</label>
            <select id="incidentVisibility" name="visibility">
              <option value="">Not documented</option>
              <option>Private</option>
              <option>Team</option>
              <option>Managers</option>
              <option>Restricted</option>
            </select>
          </div>
          <div class="form-field full">
            <label for="incidentSharedWithUsers">Shared with users</label>
            <input id="incidentSharedWithUsers" name="sharedWithUsers" autocomplete="off">
          </div>
          <div class="form-field full">
            <label for="incidentBusinessImpact">Business impact</label>
            <textarea id="incidentBusinessImpact" name="businessImpact"></textarea>
          </div>
          <div class="form-field full">
            <label for="incidentExecutiveSummary">Executive summary</label>
            <textarea id="incidentExecutiveSummary" name="executiveSummary"></textarea>
          </div>
          <div class="form-field full">
            <label for="incidentTechnicalSummary">Technical summary</label>
            <textarea id="incidentTechnicalSummary" name="technicalSummary"></textarea>
          </div>
          <div class="form-field full">
            <label for="incidentSuspectedRootCause">Suspected root cause</label>
            <textarea id="incidentSuspectedRootCause" name="suspectedRootCause"></textarea>
          </div>
          <div class="form-field full">
            <label for="incidentLessonsLearned">Lessons learned</label>
            <textarea id="incidentLessonsLearned" name="lessonsLearned"></textarea>
          </div>
        </div>
        <p class="form-error" id="incidentFormError"></p>
        <div class="modal-actions">
          <button class="secondary-button" type="button" id="cancelIncidentForm">Cancel</button>
          <button class="primary-button" type="submit">Save Incident</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/render.js?v=cleanup-20260618"></script>
  <script src="js/app.js?v=cleanup-20260618"></script>

</body>
</html>
